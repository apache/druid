name: "Stability Runner"

on:
  workflow_dispatch:
    inputs:
      maven_args:
        description: "Maven arguments for both install and test phases (e.g. -pl embedded-tests -Dtest=MinIOStorageTest)"
        required: true
        type: string
      jdk:
        description: "JDK version"
        default: "25"
        type: string
  workflow_call:
    inputs:
      maven_args:
        required: true
        type: string
      jdk:
        required: false
        type: string
        default: "25"

jobs:
  stability:
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5, 6, 7, 8]
    uses: ./.github/workflows/worker.yml
    with:
      script: ".github/scripts/run-stability ${{ inputs.maven_args }}"
      artifact_prefix: "stability-jdk${{ inputs.jdk }}"
      jdk: ${{ inputs.jdk }}
      key: "stability-shard-${{ matrix.shard }}"
