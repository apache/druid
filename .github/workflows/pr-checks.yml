name: "PR Commit Checks"

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  conventional-commits:
    if: github.repository == 'apache/druid' && github.event.pull_request.base.ref == 'master'
    name: Verify PR title conforms to Conventional Commits
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Druid uses Conventional Commits for release automation.
          # See https://www.conventionalcommits.org/en/v1.0.0/ for the spec.
          types: |
            backport
            build
            ci
            dev
            docs
            feat
            fix
            minor
            perf
            refactor
            release
            revert
            style
            test
