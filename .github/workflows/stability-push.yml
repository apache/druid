name: "Stability Runner (push)"

on:
  push:
    branches:
      - "stability/**"

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      maven_args: ${{ steps.extract.outputs.maven_args }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 20
      - name: Extract STABILITY_MAVEN_ARGS from commit messages
        id: extract
        run: |
          MAVEN_ARGS=$(git log --grep='STABILITY_MAVEN_ARGS=' -1 --format=%B | sed -n 's/^STABILITY_MAVEN_ARGS=//p')
          if [ -z "$MAVEN_ARGS" ]; then
            echo "No STABILITY_MAVEN_ARGS found in recent commits." >&2
            exit 1
          fi
          echo "maven_args=$MAVEN_ARGS" >> "$GITHUB_OUTPUT"

  stability:
    needs: prepare
    uses: ./.github/workflows/stability.yml
    with:
      maven_args: ${{ needs.prepare.outputs.maven_args }}
